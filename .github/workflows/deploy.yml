name: Deploy PWA (GitHub Pages)

# Her push'ta uygulamayi otomatik derleyip GitHub Pages'e yayinlar.
# Yayin adresi: https://naturelobez3131.github.io/Dorugunaminabasim/

on:
  push:
    branches:
      - main
      - claude/daily-activity-planner-ai-4tnR7
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Pages yapilandir (gerekirse etkinlestir)
        id: pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - run: npm ci

      - name: Derle
        run: npm run build
        env:
          # Proje sayfasi alt-yolu (configure-pages base_path verir; yedek olarak repo adi)
          BASE_PATH: ${{ steps.pages.outputs.base_path }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
